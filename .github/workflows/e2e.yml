name: End to End Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - main
      - master

jobs:
  e2e-tests:
    name: End to End Tests
    runs-on: ubuntu-latest

    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'

    services:
      docker:
        image: docker:26-dind
        options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server production image
        run: |
          cd ./packages/server
          docker build \
            --tag server-prod:${{ github.sha }} \
            --file Dockerfile-production \
            .

      - name: Build client production image
        run: |
          cd ./packages/client
          docker build \
            --tag client-prod:${{ github.sha }} \
            --file Dockerfile-production \
            .

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start services with Cypress Compose
        run: |
          # Update docker-compose.cypress-ci.yml to use local images
          sed -i "s|\$IMAGE_ORG/\$IMAGE_NAME_SERVER_PREPRODUCTION:\$CI_COMMIT_SHA|server-prod:${{ github.sha }}|g" docker-compose.cypress-ci.yml
          sed -i "s|\$IMAGE_ORG/\$IMAGE_NAME_CLIENT_PREPRODUCTION:\$CI_COMMIT_SHA|client-prod:${{ github.sha }}|g" docker-compose.cypress-ci.yml

          # Start services
          docker compose -f docker-compose.cypress-ci.yml up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for server to be ready..."
          timeout 60 bash -c 'until curl -s --head --request GET "http://localhost:3000/healthcheck" | grep "200 OK" > /dev/null; do echo "Waiting for server..."; sleep 5; done'

          echo "Waiting for client to be ready..."
          timeout 60 bash -c 'until curl -s --head --request GET "http://localhost:4000" | grep "200 OK" > /dev/null; do echo "Waiting for client..."; sleep 5; done'
