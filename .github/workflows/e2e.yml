name: End to End Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - main
      - master

jobs:
  e2e-tests:
    name: End to End Tests
    runs-on: ubuntu-latest

    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services with Docker Compose
        run: |
          # Build and start all services
          GITHUB_SHA=${{ github.sha }} docker compose -f docker-compose.cypress-ci.yml up -d --build

          # Show running containers (useful for debugging)
          docker compose -f docker-compose.cypress-ci.yml ps

      - name: Wait for services to be running
        run: |
          echo "Waiting 30 seconds for services to initialize..."
          sleep 30

      - name: Check service status
        run: |
          docker compose -f docker-compose.cypress-ci.yml ps
          docker compose -f docker-compose.cypress-ci.yml logs

      - name: Check endpoints
        run: |
          echo "Testing server health..."
          curl -v http://localhost:3000/healthcheck || true

          echo "Testing client..."
          curl -v http://localhost:4000 || true

      - name: Install Cypress dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Setup test database
        run: |
          # List containers to see actual names
          docker compose -f docker-compose.cypress-ci.yml ps

          # Try both possible naming patterns
          CONTAINER=$(docker compose -f docker-compose.cypress-ci.yml ps -q server)
          if [ -z "$CONTAINER" ]; then
            CONTAINER="hhmi-server-1"
          fi

          echo "Using container: $CONTAINER"
          docker exec $CONTAINER node ./scripts/truncateDB.js || echo "Truncate script failed, continuing anyway"

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          config: baseUrl=http://localhost:4000
          browser: chrome
          install: false # We already installed dependencies
          spec: cypress/e2e/**/*.cy.js # Adjust path to your test files
        env:
          CYPRESS_CACHE_FOLDER: ~/.cache/Cypress
          # Add any other environment variables your tests need
          # For example:
          # CYPRESS_API_URL: http://localhost:3000
