name: End to End Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - main
      - master

jobs:
  e2e-tests:
    name: End to End Tests
    runs-on: ubuntu-latest

    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'

    container:
      image: cokoapps/cypress:18
      options: --network container:docker --privileged
      env:
        DOCKER_HOST: tcp://docker:2375

    services:
      docker:
        image: docker:dind
        options: --privileged
        ports:
          - 2375:2375

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Docker daemon
        run: |
          echo "Waiting for Docker daemon..."
          timeout 30 bash -c 'until docker info > /dev/null 2>&1; do echo "Waiting for Docker..."; sleep 2; done'
          docker info

      - name: Start services
        run: |
          docker compose -f docker-compose.cypress-ci.yml up -d --build

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -s --head --request GET "http://docker:3000/healthcheck" | grep "200 OK"; do sleep 5; done'
          timeout 60 bash -c 'until curl -s --head --request GET "http://docker:4000" | grep "200 OK"; do sleep 5; done'

      - name: Run tests
        run: |
          yarn install --immutable
          cypress run --config baseUrl=http://docker:4000 --browser chrome
