services:
  client:
    # image: cokoapps/hhmi-client-ci-production:$CI_COMMIT_SHA
    build:
      context: ./packages/client
      dockerfile: Dockerfile-production
    ports:
      - ${CLIENT_PORT:-4000}:8080
    environment:
      - NODE_ENV=development
      - SERVER_URL=http://docker:3000
      - CLIENT_SHOW_EMAIL_LOGIN_OPTION=true
      - CLIENT_BIOINTERACTIVE_OAUTH_CLIENT_ID=${CLIENT_BIOINTERACTIVE_OAUTH_CLIENT_ID:-"hhmi_assessment_builder"}
      - CLIENT_BIOINTERACTIVE_OAUTH_REDIRECT_URI=${CLIENT_BIOINTERACTIVE_OAUTH_REDIRECT_URI:-""}

  server:
    # image: cokoapps/hhmi-server-ci-production:$CI_COMMIT_SHA
    build:
      context: ./packages/server
      dockerfile: Dockerfile-production
    depends_on:
      - db
      - createbucket
    ports:
      - ${SERVER_PORT:-3000}:3000
    environment:
      - NODE_ENV=development
      - SECRET=${SECRET:-superSecretThing}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-hhmi_dev}
      - POSTGRES_USER=${POSTGRES_USER:-hhmi_dev_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hhmi_dev_user_password}
      - CLIENT_URL=${CLIENT_URL:-http://docker:4000}
      - MAILER_SENDER=${MAILER_SENDER:-dev@example.com}
      - MAILER_HOSTNAME=${MAILER_HOSTNAME}
      - MAILER_PORT=${MAILER_PORT}
      - MAILER_USER=${MAILER_USER}
      - MAILER_PASSWORD=${MAILER_PASSWORD}
      - S3_URL=${S3_URL:-http://filehosting:9000}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-nonRootUser}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-nonRootPassword}
      - S3_BUCKET=${S3_BUCKET:-uploads}
      - BIOINTERACTIVE_OAUTH_CLIENT_ID=${BIOINTERACTIVE_OAUTH_CLIENT_ID:-hhmi_assessment_builder}
      - BIOINTERACTIVE_OAUTH_CLIENT_SECRET=${BIOINTERACTIVE_OAUTH_CLIENT_SECRET:-abc123}
      - BIOINTERACTIVE_OAUTH_REDIRECT_URI=${BIOINTERACTIVE_OAUTH_REDIRECT_URI:-https://hhmi.cloud68.co/biointeractive-oauth}
      - BIOINTERACTIVE_OAUTH_TOKEN_URI=${BIOINTERACTIVE_OAUTH_TOKEN_URI:-https://www.biointeractive.org/oauth2/token}
      - BIOINTERACTIVE_OAUTH_API_USER_URI=${BIOINTERACTIVE_OAUTH_API_USER_URI:-https://www.biointeractive.org/oauth2/UserInfo}
      - BIOINTERACTIVE_OAUTH_AUTH_SERVER_URI=${BIOINTERACTIVE_OAUTH_AUTH_SERVER_URI:-https://www.biointeractive.org/oauth2/authorize}
      - CLIENT_SHOW_EMAIL_LOGIN_OPTION=true
    privileged: true
    command: ['yarn', 'coko-server', 'start']

  db:
    image: postgres:14
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-hhmi_dev}
      - POSTGRES_USER=${POSTGRES_USER:-hhmi_dev_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hhmi_dev_user_password}

  filehosting:
    image: minio/minio:RELEASE.2023-03-24T21-41-23Z
    ports:
      - ${S3_PORT:-9000}:9000
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - minio_storage:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-superSecretAdminPassword}
    command: server --console-address ":${MINIO_CONSOLE_PORT:-9001}" /data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  createbucket:
    image: minio/mc:RELEASE.2023-02-16T19-20-11Z
    depends_on:
      filehosting:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc config host add cokoServer http://filehosting:${S3_PORT:-9000} ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-superSecretAdminPassword};
        /usr/bin/mc admin user add cokoServer/ ${S3_ACCESS_KEY_ID:-nonRootUser} ${S3_SECRET_ACCESS_KEY:-nonRootPassword};
        /usr/bin/mc admin user enable cokoServer/ ${S3_ACCESS_KEY_ID:-nonRootUser};
        /usr/bin/mc mb cokoServer/${S3_BUCKET:-uploads};
        /usr/bin/mc admin policy set cokoServer/ readwrite user=${S3_ACCESS_KEY_ID:-nonRootUser};
        exit 0;
      "

volumes:
  minio_storage:
