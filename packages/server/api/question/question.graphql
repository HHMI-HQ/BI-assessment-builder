type Question {
  id: ID!
  versions(latestOnly: Boolean, publishedOnly: Boolean): [QuestionVersion!]!
  agreedTc: Boolean!
}

input UpdateQuestionInput {
  agreedTc: Boolean
  questionVersionId: ID!
  topic: String
  subTopic: String
  submitted: Boolean!
  content: String
  keywords: [String]
  biointeractiveResources: String
  cognitiveLevel: String
  affectiveLevel: String
  psychomotorLevel: String
  readingLevel: String
  framework: String
  frameworkMetadata: FrameworkMetadataInput
  supplementaryFields: [SupplementaryFieldsInput]
}

type QuestionsResponse {
  result: [Question!]!
  totalCount: Int
}

extend type Query {
  question(id: ID!): Question!
  getPublishedQuestions: QuestionsResponse!
  getAuthorDashboard: QuestionsResponse!
  getReviewerDashboard: QuestionsResponse!
  getManagingEditorDashboard: QuestionsResponse!
}

extend type Mutation {
  createQuestion: Question!
  rejectQuestion(questionId: ID!): Question!
  moveQuestionVersionToReview(questionVersionId: ID!): QuestionVersion!
  publishQuestionVersion(questionVersionId: ID!): QuestionVersion!

  updateQuestion(
    questionId: ID!
    questionVersionId: ID!
    input: UpdateQuestionInput!
  ): Question!

  submitQuestion(
    questionId: ID!
    questionVersionId: ID!
    input: UpdateQuestionInput!
  ): Question!
}
