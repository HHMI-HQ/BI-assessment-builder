# TYPES

type Question {
  id: ID!
  versions(latestOnly: Boolean, publishedOnly: Boolean): [QuestionVersion!]!
  agreedTc: Boolean!
  rejected: Boolean!
  author: User
}

type QuestionVersion {
  id: ID!
  created: DateTime!
  updated: DateTime!

  question: Question!
  content: String

  submitted: Boolean!
  underReview: Boolean!
  inProduction: Boolean!
  published: Boolean!

  publicationDate: DateTime

  topics: [Topic!]!
  courses: [Course!]!

  keywords: [String!]!
  biointeractiveResources: [String!]!

  cognitiveLevel: String
  affectiveLevel: String
  psychomotorLevel: String
  readingLevel: String

  questionType: String
  complexItemSetId: ID
  leadingContent: String
  lastEdit: DateTime
}

type Topic {
  topic: String!
  subtopic: String
}

type Course {
  course: String!
  units: [Unit!]!
}

type Unit {
  application: String
  coreCompetence: String
  coreConcept: String
  courseTopic: String
  essentialKnowledge: String
  learningObjective: String
  skill: String
  subcompetence: String
  subcompetenceStatement: String
  subdiscipline: String
  subdisciplineStatement: String
  understanding: String
  unit: String
}

type QuestionsResponse {
  result: [Question!]!
  totalCount: Int
  relatedQuestionsIds: [ID]
}

# INPUTS

input UpdateQuestionInput {
  agreedTc: Boolean
  content: String

  complexItemSetId: ID
  questionType: String

  topics: [TopicInput!]
  courses: [CourseInput!]

  keywords: [String!]
  biointeractiveResources: [String!]

  cognitiveLevel: String
  affectiveLevel: String
  psychomotorLevel: String
  readingLevel: String
}

input TopicInput {
  topic: String!
  subtopic: String
}

input CourseInput {
  course: String!
  units: [UnitInput!]!
}

input UnitInput {
  application: String
  courseTopic: String
  essentialKnowledge: String
  learningObjective: String
  skill: String
  understanding: String
  unit: String
}

input SidebarFilters {
  topic: String
  subtopic: String
  course: String
  application: String
  courseTopic: String
  essentialKnowledge: String
  learningObjective: String
  skill: String
  understanding: String
  unit: String

  cognitiveLevel: [String]
  questionType: [String]
  complexItemSet: [String]
}

input FilterQuestionsParams {
  filters: SidebarFilters
  searchQuery: String
}

input QuestionPageInput {
  orderBy: String
  ascending: Boolean
  pageSize: Int
  page: Int
}

enum AdjecentQuestion {
  NEXT
  PREV
}

input GenerateWordFileOptionsInput {
  showFeedback: Boolean
  showMetadata: Boolean
}

# QUERIES & MUTATIONS

extend type Query {
  question(id: ID!): Question!
  getPublishedQuestions(
    params: FilterQuestionsParams
    options: QuestionPageInput
  ): QuestionsResponse!

  getPublishedQuestionsIds: [ID]!

  getAuthorDashboard(
    orderBy: String
    ascending: Boolean
    page: Int
    pageSize: Int
    searchQuery: String
  ): QuestionsResponse!

  getReviewerDashboard(
    orderBy: String
    ascending: Boolean
    page: Int
    pageSize: Int
    searchQuery: String
  ): QuestionsResponse!

  getManagingEditorDashboard(
    orderBy: String
    ascending: Boolean
    page: Int
    pageSize: Int
    searchQuery: String
  ): QuestionsResponse!

  getHandlingEditorDashboard(
    orderBy: String
    ascending: Boolean
    page: Int
    pageSize: Int
    searchQuery: String
  ): QuestionsResponse!
}

extend type Mutation {
  createQuestion(input: UpdateQuestionInput): Question!
  duplicateQuestion(questionId: ID!): Question!
  rejectQuestion(questionId: ID!): Question!
  moveQuestionVersionToReview(questionVersionId: ID!): QuestionVersion!
  moveQuestionVersionToProduction(questionVersionId: ID!): QuestionVersion!
  publishQuestionVersion(questionVersionId: ID!): QuestionVersion!

  assignAuthorship(questionId: ID!, userId: ID!): Boolean

  updateQuestion(
    questionId: ID!
    questionVersionId: ID!
    input: UpdateQuestionInput!
  ): Question!

  submitQuestion(
    questionId: ID!
    questionVersionId: ID!
    input: UpdateQuestionInput!
  ): Question!

  generateWordFile(
    questionVersionId: ID!
    options: GenerateWordFileOptionsInput
  ): String!

  generateScormZip(questionVersionId: ID!): String!
  createNewQuestionVersion(questionId: ID!): Question!
  uploadFiles(files: [Upload!]!): [File!]!
}
