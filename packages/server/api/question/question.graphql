# TYPES

type Question {
  id: ID!
  versions(latestOnly: Boolean, publishedOnly: Boolean): [QuestionVersion!]!
  agreedTc: Boolean!
  rejected: Boolean!
}

type QuestionVersion {
  id: ID!
  created: DateTime!
  updated: DateTime!

  question: Question!
  content: String

  submitted: Boolean!
  underReview: Boolean!
  published: Boolean!

  publicationDate: DateTime

  topics: [Topic!]!
  courses: [Course!]!

  keywords: [String!]!
  biointeractiveResources: [String!]!

  cognitiveLevel: String
  affectiveLevel: String
  psychomotorLevel: String
  readingLevel: String

  questionType: String
}

type Topic {
  topic: String!
  subtopic: String
}

type Course {
  course: String!
  units: [Unit!]!
}

type Unit {
  application: String
  coreCompetence: String
  coreConcept: String
  courseTopic: String
  essentialKnowledge: String
  learningObjective: String
  skill: String
  subcompetence: String
  subcompetenceStatement: String
  subdiscipline: String
  subdisciplineStatement: String
  understanding: String
  unit: String
}

type QuestionsResponse {
  result: [Question!]!
  totalCount: Int
}

# INPUTS

input UpdateQuestionInput {
  agreedTc: Boolean
  content: String

  questionType: String

  topics: [TopicInput!]
  courses: [CourseInput!]

  keywords: [String!]
  biointeractiveResources: [String!]

  cognitiveLevel: String
  affectiveLevel: String
  psychomotorLevel: String
  readingLevel: String
}

input TopicInput {
  topic: String!
  subtopic: String
}

input CourseInput {
  course: String!
  units: [UnitInput!]!
}

input UnitInput {
  application: String
  courseTopic: String
  essentialKnowledge: String
  learningObjective: String
  skill: String
  understanding: String
  unit: String
}

# QUERIES & MUTATIONS

extend type Query {
  question(id: ID!): Question!
  getPublishedQuestions: QuestionsResponse!

  getAuthorDashboard(
    orderBy: String
    ascending: Boolean
    page: Int
    pageSize: Int
    searchQuery: String
  ): QuestionsResponse!

  getReviewerDashboard(
    orderBy: String
    ascending: Boolean
    page: Int
    pageSize: Int
    searchQuery: String
  ): QuestionsResponse!

  getManagingEditorDashboard(
    orderBy: String
    ascending: Boolean
    page: Int
    pageSize: Int
    searchQuery: String
  ): QuestionsResponse!
}

extend type Mutation {
  createQuestion: Question!
  rejectQuestion(questionId: ID!): Question!
  moveQuestionVersionToReview(questionVersionId: ID!): QuestionVersion!
  publishQuestionVersion(questionVersionId: ID!): QuestionVersion!

  updateQuestion(
    questionId: ID!
    questionVersionId: ID!
    input: UpdateQuestionInput!
  ): Question!

  submitQuestion(
    questionId: ID!
    questionVersionId: ID!
    input: UpdateQuestionInput!
  ): Question!
}
