type ComplexItemSet {
  id: ID!
  title: String!
  leadingContent: String
  questions: QuestionsResponse
  authors: [User]
  created: DateTime
  updated: DateTime
  containsSubmissions: Boolean
}

input SetFilters {
  searchQuery: String
}

type ComplexItemSetsResponse {
  result: [ComplexItemSet]!
  totalCount: Int
}

extend type Query {
  complexItemSets(
    params: SetFilters
    options: QuestionPageInput
  ): ComplexItemSetsResponse!
  complexItemSet(id: ID!, questionsOptions: QuestionPageInput): ComplexItemSet
  getAvailableSets(publishedOnly: Boolean): [ComplexItemSet]!
}

extend type Mutation {
  createComplexItemSet(title: String!, leadingContent: String): ComplexItemSet!
  editComplexItemSet(
    id: ID!
    title: String
    leadingContent: String
  ): ComplexItemSet!
  deleteComplexItemSet(id: ID!): ID!
  assignSetAuthor(setId: ID!, userIds: [ID!]!): Boolean
  exportSets(setIds: [ID!]!, options: GenerateWordFileOptionsInput): String!
  exportSetQuestions(
    setId: ID!
    questionIds: [ID!]!
    orderBy: String
    ascending: Boolean
    options: GenerateWordFileOptionsInput
  ): String!
  exportSetsQTI(setIds: [ID!]!): String!
  exportSetQuestionsQTI(
    setId: ID!
    questionIds: [ID!]!
    orderBy: String
    ascending: Boolean
  ): String!
}
