type List {
  id: ID!
  title: String!
  created: DateTime
  customOrder: [ID!]
  questions: QuestionsResponse
}

type ListMember {
  listId: ID!
  questionId: ID!
}

type ListsResponse {
  result: [List!]!
  totalCount: Int
}

extend type Query {
  list(
    id: ID!
    questionsQuery: String
    questionsOptions: QuestionPageInput
  ): List!

  myLists(
    page: Int
    pageSize: Int
    searchQuery: String
    orderBy: String
    ascending: Boolean
  ): ListsResponse!

  # getLists: [List!]!
}

extend type Mutation {
  createList(title: String!, questions: [ID!]): List!
  editList(id: ID!, title: String): List!
  deleteLists(ids: [ID!]!): Int
  addToList(listId: ID!, questionIds: [ID!]!): [ListMember!]!
  deleteFromList(listId: ID!, questionIds: [ID!]!): [ID!]!
  exportQuestions(
    listId: ID!
    questionIds: [ID!]!
    orderBy: String
    ascending: Boolean
    options: GenerateWordFileOptionsInput
  ): String!
  exportList(
    listId: ID!
    orderBy: String
    ascending: Boolean
    options: GenerateWordFileOptionsInput
  ): String!
  exportQuestionsQTI(
    listId: ID!
    questionIds: [ID!]!
    orderBy: String
    ascending: Boolean
  ): String!
  exportListQTI(listId: ID!, orderBy: String, ascending: Boolean): String!
  reorderList(listId: ID!, customOrder: [ID!]!): List!
}
