type Metadata {
  topics: [TopicsMetadata!]!
  frameworks: [FrameworksMetadata!]!
  introToBioMeta: [IntroductoryBioMetadata!]!
  blooms: BloomsType
  questionTypes: [SimpleValueLabelPair]!
}

type SimpleValueLabelPair {
  value: String!
  label: String!
}

type TopicsMetadata {
  value: String!
  label: String!
  subtopics: [SimpleValueLabelPair]!
}

type BloomsType {
  cognitive: [CognitiveBloomsLevelMetadata!]!
  affective: [SimpleValueLabelPair!]!
  psychomotor: [SimpleValueLabelPair!]!
}

type CognitiveBloomsLevelMetadata {
  label: String!
  options: [SimpleValueLabelPair!]!
}

type FrameworksMetadata {
  value: String
  label: String
  units: [SimpleValueLabelPair!]!
  topics: [CourseTopic!]!
  learningObjectives: [LearningObjective!]
  essentialKnowledge: [EssentialKnowledge!]
  applications: [Application!]
  skills: [Skill!]
  understandings: [Understanding!]
}

type CourseTopic {
  value: String
  label: String
  unit: String
}

type LearningObjective {
  value: String
  label: String
  unit: String
  topic: String
}

type EssentialKnowledge {
  value: String
  label: String
  unit: String
  topic: String
  learningObjective: String
}

type Application {
  value: String
  label: String
  unit: String
  topic: String
}

type Skill {
  value: String
  label: String
  unit: String
  topic: String
}

type Understanding {
  value: String
  label: String
  unit: String
  topic: String
}

type CoreConcept {
  value: String
  label: String
  explanatoryItems: [String!]
}

type SubdisciplineStatement {
  value: String
  label: String
  coreConcept: String
  subdiscipline: String
}

type Subcompetence {
  value: String
  label: String
  coreCompetence: String
  explanation: String
}

type SubcompetenceStatement {
  value: String
  label: String
  coreCompetence: String
  subcompetence: String
}

type AAMCCategories {
  value: String
  label: String
  concept: String
  explanation: String
}

type IntroductoryBioMetadata {
  value: String
  label: String
  # Vision and change metadata
  coreConcepts: [CoreConcept!]
  subdisciplines: [SimpleValueLabelPair!]
  subdisciplineStatements: [SubdisciplineStatement!]
  coreCompetencies: [SimpleValueLabelPair!]
  subcompetencies: [Subcompetence!]
  subcompetenceStatements: [SubcompetenceStatement!]
  # AAMC future physicians metadata
  concepts: [SimpleValueLabelPair!]
  categories: [AAMCCategories!]
}

extend type Query {
  getMetadata: Metadata!
}
