extend type User {
  middleName: String
  pronouns: String

  phone: String

  country: String
  state: String
  city: String
  address: String
  zipCode: String

  position: String
  organization: String
  institutionalSetting: String
  teachingExperience: String
  typeOfInstitution: String

  apIbCourses: Boolean
  employmentStatus: String
  otherLevel: String

  # TO DO -- make these not nullable when the coko server user model issue is solved
  # coursesTeaching: [String!]!
  # topicsReviewing: [String!]!
  coursesTeaching: [String!]
  topicsReviewing: [String!]

  receivedTraining: Boolean
  receivedInclusiveLanguageTraining: Boolean

  source: String

  profileSubmitted: Boolean!
  role: String
}

input UserProfileInput {
  id: ID!
  givenNames: String!
  surname: String!
  displayName: String!
  pronouns: String

  email: String!
  phone: String!

  country: String!
  state: String
  city: String!
  address: String
  zipCode: String

  position: String!
  organization: String!
  institutionalSetting: String
  teachingExperience: String!
  typeOfInstitution: String

  apIbCourses: Boolean
  employmentStatus: String
  otherLevel: String

  reviewerInterest: Boolean!

  coursesTeaching: [String!]!
  topicsReviewing: [String!]!

  receivedTraining: Boolean!
  receivedInclusiveLanguageTraining: Boolean!

  source: String
}

extend input UsersQueryParams {
  search: String
}

type UsersQuestionsResult {
  userId: ID
  publishedQuestions: [ID]!
  questionsInEditorialFlow: [ID]!
  rejectedQuestions: [ID]!
}

extend type Query {
  filterUsers(params: UsersQueryParams, options: PageInput): Users!
}

extend type Mutation {
  submitQuestionnaire(input: UserProfileInput!): User!
  updateUserProfile(input: UserProfileInput!): User!
  bioInteractiveLogin(authCode: String!): LoginResult!
  deleteUsersRelatedItems(ids: [ID!]!): Boolean!
}
