type GlobalTeamMembersResponse {
  result: [User!]!
  totalCount: Int
}

input UpdateGlobalTeamsInput {
  id: ID!
  members: [ID!]!
}

input FilterTeamMembersInput {
  orderBy: String
  ascending: Boolean
}

extend type Query {
  getNonTeamMemberUsers(teamId: ID!, term: String!): [User!]!
  filterGlobalTeamMembers(
    role: String!
    query: String
    options: FilterTeamMembersInput
  ): GlobalTeamMembersResponse!
}

extend type Mutation {
  updateGlobalTeams(input: [UpdateGlobalTeamsInput!]!): [Team!]!
}
