type GlobalTeamMembersResponse {
  result: [User!]!
  totalCount: Int
}

type AddExternalReviewerResponse {
  teamMemberId: ID!
  userExists: Boolean!
}

input UpdateGlobalTeamsInput {
  id: ID!
  members: [ID!]!
  removedMembers: [ID]
}

input FilterTeamMembersInput {
  orderBy: String
  ascending: Boolean
  pageSize: Int
  page: Int
}

input AddExternalReviewerInput {
  email: String!
  givenNames: String!
  surname: String!
}

extend type Query {
  getNonTeamMemberUsers(teamId: ID!, term: String!): [User!]!
  filterGlobalTeamMembers(
    role: String!
    query: String
    options: FilterTeamMembersInput
  ): GlobalTeamMembersResponse!

  searchForReviewers(searchTerm: String!, questionVersionId: ID!): [User!]!
}

extend type Mutation {
  updateGlobalTeams(input: [UpdateGlobalTeamsInput!]!): [Team!]!

  addExternalReviewer(
    questionVersionId: ID!
    input: AddExternalReviewerInput!
  ): AddExternalReviewerResponse!

  inviteReviewer(questionVersionId: ID!, reviewerId: ID!): TeamMember!
  revokeInvitation(questionVersionId: ID!, reviewerId: ID!): QuestionVersion!

  acceptOrRejectInvitation(
    questionVersionId: ID!
    accepted: Boolean!
    reason: String
  ): Boolean!
}
