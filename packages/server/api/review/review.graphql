input SubmitReviewInput {
  questionVersionId: ID!
  content: String
  attachments: [Upload!]
}

type ReviewStatus {
  pending: Boolean
  submitted: Boolean
}

type Review {
  id: ID!
  questionVersionId: ID!
  reviewerId: ID!

  content: String
  attachments: [Attachment!]
  status: ReviewStatus
}

# extend type Query {
#   reviews(questionId: ID!, reviewerId: ID!): [Review!]!
# }

extend type Mutation {
  submitReview(questionVersionId: ID!, content: String): ID!
}
