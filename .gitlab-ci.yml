variables:
  IMAGE_ORG: cokoapps
  IMAGE_NAME_SERVER_DEVELOPMENT: hhmi-server-ci-development
  IMAGE_NAME_CLIENT_DEVELOPMENT: hhmi-client-ci-development
  IMAGE_NAME_SERVER_PREPRODUCTION: hhmi-server-ci-production
  IMAGE_NAME_CLIENT_PREPRODUCTION: hhmi-client-ci-production
  IMAGE_NAME_SERVER_PRODUCTION: hhmi-server
  IMAGE_NAME_CLIENT_PRODUCTION: hhmi-client
  IMAGE_NAME_STORYBOOK: hhmi-storybook
  CYPRESS_RECORD_KEY: a25f8612-45b7-4f19-941d-6fd738b181c1
  WORKDIR_SERVER: /home/node/hhmi
  WORKDIR_CLIENT: /home/node/app

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_TITLE =~ /^Draft:/
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'staging'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - Build development
  - Lint & Unit test
  - Build production
  - End to end test
  - Publish production
  - Deploy production
  - Version
  - Release

# BUILD DEVELOPMENT

client build development:
  stage: Build development
  image: docker:26
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - when: always
  services:
    - docker:26-dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - docker build --tag $IMAGE_ORG/$IMAGE_NAME_CLIENT_DEVELOPMENT:$CI_COMMIT_SHA ./packages/client -f packages/client/Dockerfile-development
    - docker push $IMAGE_ORG/$IMAGE_NAME_CLIENT_DEVELOPMENT:$CI_COMMIT_SHA

server build development:
  stage: Build development
  image: docker:26
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - when: always
  services:
    - docker:26-dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - docker build --tag $IMAGE_ORG/$IMAGE_NAME_SERVER_DEVELOPMENT:$CI_COMMIT_SHA ./packages/server -f packages/server/Dockerfile-development
    - docker push $IMAGE_ORG/$IMAGE_NAME_SERVER_DEVELOPMENT:$CI_COMMIT_SHA

# LINT & UNIT TEST

client lint:
  stage: Lint & Unit test
  needs:
    - client build development
  image: $IMAGE_ORG/$IMAGE_NAME_CLIENT_DEVELOPMENT:$CI_COMMIT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - when: always
  script:
    - cd $WORKDIR_CLIENT
    - yarn coko-lint run

client unit test:
  stage: Lint & Unit test
  needs:
    - client build development
  image: $IMAGE_ORG/$IMAGE_NAME_CLIENT_DEVELOPMENT:$CI_COMMIT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - when: always
  script:
    - cd $WORKDIR_CLIENT
    - yarn jest

server lint:
  stage: Lint & Unit test
  needs:
    - server build development
  image: $IMAGE_ORG/$IMAGE_NAME_SERVER_DEVELOPMENT:$CI_COMMIT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - when: always
  script:
    - cd $WORKDIR_SERVER
    - yarn coko-lint run --skip-stylelint

server unit test:
  stage: Lint & Unit test
  needs:
    - server build development
  image: docker:23
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - when: always
  services:
    - docker:23-dind
  script:
    - cp .env.ci .env
    - docker-compose up -d server db
    - docker pull $IMAGE_ORG/$IMAGE_NAME_SERVER_DEVELOPMENT:$CI_COMMIT_SHA
    - |
      docker run \
      --network hhmi_default \
      -e POSTGRES_HOST=db -e POSTGRES_PORT=5432 -e POSTGRES_DB=hhmi_dev -e POSTGRES_USER=hhmi_dev_user -e POSTGRES_PASSWORD=hhmi_dev_user_password \
      -e BIOINTERACTIVE_OAUTH_API_USER_URI=bio.int/api -e BIOINTERACTIVE_OAUTH_TOKEN_URI=bio.int/token -e BIOINTERACTIVE_OAUTH_CLIENT_ID=123 -e BIOINTERACTIVE_OAUTH_CLIENT_SECRET=321 -e BIOINTERACTIVE_OAUTH_REDIRECT_URI=hhmi.co/biointeractive-oauth \
      -e SECRET=superSecretThing \
      $IMAGE_ORG/$IMAGE_NAME_SERVER_DEVELOPMENT:$CI_COMMIT_SHA \
      yarn jest --verbose --forceExit

# BUILD PRODUCTION

build server:
  stage: Build production
  image: docker:26
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - when: always
  services:
    - docker:26-dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - cd ./packages/server
    - docker pull $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:latest || true
    - docker build --cache-from $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:latest --tag $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:$CI_COMMIT_SHA --tag $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:latest . -f Dockerfile-server-deploy
    - docker push $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:$CI_COMMIT_SHA
    - docker push $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:latest

build client:
  stage: Build production
  image: docker:26
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - when: always
  services:
    - docker:26-dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - cd ./packages/client
    - docker pull $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:latest || true
    - docker build --cache-from $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:latest --tag $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:$CI_COMMIT_SHA --tag $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:latest . -f Dockerfile-client-deploy
    - docker push $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:$CI_COMMIT_SHA
    - docker push $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:latest

# END TO END TEST

end to end tests:
  stage: End to end test
  image: cokoapps/cypress:18
  services:
    - docker:dind
  needs:
    - build client
    - build server
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ''
  script:
    - docker compose -f docker-compose.cypress-ci.yml up -d
    - timeout 30 bash -c 'until curl -s --head --request GET "http://docker:3000/healthcheck" | grep "200 OK" > /dev/null; do sleep 5; done'
    - timeout 30 bash -c 'until curl -s --head --request GET "http://docker:4000" | grep "200 OK" > /dev/null; do sleep 5; done'
    - yarn install --frozen-lockfile
    - cypress run --config baseUrl=http://docker:4000 --browser chrome

# PUBLISH PRODUCTION

publish client:
  stage: Publish production
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - docker pull $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:$CI_COMMIT_SHA
    - docker tag $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:$CI_COMMIT_SHA $IMAGE_ORG/$IMAGE_NAME_CLIENT_PRODUCTION:$CI_COMMIT_SHA
    - docker tag $IMAGE_ORG/$IMAGE_NAME_CLIENT_PREPRODUCTION:$CI_COMMIT_SHA $IMAGE_ORG/$IMAGE_NAME_CLIENT_PRODUCTION:latest
    - docker push $IMAGE_ORG/$IMAGE_NAME_CLIENT_PRODUCTION:$CI_COMMIT_SHA
    - docker push $IMAGE_ORG/$IMAGE_NAME_CLIENT_PRODUCTION:latest
  only:
    - staging

publish server:
  stage: Publish production
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - docker pull $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:$CI_COMMIT_SHA
    - docker tag $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:$CI_COMMIT_SHA $IMAGE_ORG/$IMAGE_NAME_SERVER_PRODUCTION:$CI_COMMIT_SHA
    - docker tag $IMAGE_ORG/$IMAGE_NAME_SERVER_PREPRODUCTION:$CI_COMMIT_SHA $IMAGE_ORG/$IMAGE_NAME_SERVER_PRODUCTION:latest
    - docker push $IMAGE_ORG/$IMAGE_NAME_SERVER_PRODUCTION:$CI_COMMIT_SHA
    - docker push $IMAGE_ORG/$IMAGE_NAME_SERVER_PRODUCTION:latest
  only:
    - staging

build & publish storybook:
  stage: Publish production
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - cd ./packages/client
    - docker pull $IMAGE_ORG/$IMAGE_NAME_STORYBOOK:latest || true
    - docker build --cache-from $IMAGE_ORG/$IMAGE_NAME_STORYBOOK:latest --tag $IMAGE_ORG/$IMAGE_NAME_STORYBOOK:$CI_COMMIT_SHA --tag $IMAGE_ORG/$IMAGE_NAME_STORYBOOK:latest . -f Dockerfile-storybook-production
    - docker push $IMAGE_ORG/$IMAGE_NAME_STORYBOOK:$CI_COMMIT_SHA
    - docker push $IMAGE_ORG/$IMAGE_NAME_STORYBOOK:latest
  only:
    - staging

# DEPLOY PRODUCTION

deploy production:
  stage: Deploy production
  image: $CI_REGISTRY/cokoinfra/ansible-deployer
  services:
    - docker:26-dind
  needs:
    - publish server
    - publish client
  variables:
    ANSCOMPOSE_POSTGRES_ALLOW_SELF_SIGNED_CERTIFICATES: true
    ANSCOMPOSE_CLIENT_SHOW_EMAIL_LOGIN_OPTION: true
    ANSCOMPOSE_STORYBOOK_PORT: 5000
    COMPOSE_SERVICES: client,server,storybook
    COMPOSE_SERVICES_CLIENT_URL: hhmi.coko.app
    COMPOSE_SERVICES_CLIENT_IMAGE: $IMAGE_ORG/$IMAGE_NAME_CLIENT_PRODUCTION:latest
    COMPOSE_SERVICES_SERVER_URL: hhmi-server.coko.app
    COMPOSE_SERVICES_SERVER_IMAGE: $IMAGE_ORG/$IMAGE_NAME_SERVER_PRODUCTION:latest
    COMPOSE_SERVICES_STORYBOOK_URL: hhmi-storybook.coko.app
    COMPOSE_SERVICES_STORYBOOK_IMAGE: $IMAGE_ORG/$IMAGE_NAME_STORYBOOK:latest
    DEPLOY_COMPOSE_FILE: docker-compose.cluster.yml
  script:
    - kubectl config get-contexts
    - kubectl config use-context coko-org/products/hhmi/agent:agent-1
    - cp $DEPLOY_COMPOSE_FILE /ansible
    - cd /ansible
    - ANSIBLE_FORCE_COLOR=true ansible-playbook bootstrap.yml -e "compose_file=$DEPLOY_COMPOSE_FILE"
  only:
    - staging

bump version:
  stage: Version
  # image: registry.gitlab.com/gitlab-org/release-cli:latest
  image: node:20-bullseye
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  variables:
    VERSION_BUMP_TYPE: "patch" # Default, can be overridden
    HUSKY: "0" # Disable Husky
    npm_config_ignore_scripts: "true"
  before_script:
    - |
      rm -rf .husky || true
      apt-get update && apt-get install -y openssh-client git >/dev/null
      mkdir -p ~/.ssh && chmod 700 ~/.ssh
      echo -n "$SSH_PRIVATE_KEY_BASE64" | base64 -d > ~/.ssh/ssh_private_key
      cat << EOF >> ~/.ssh/config
      Host gitlab.coko.foundation
          User git
          IdentityFile ~/.ssh/ssh_private_key
          IdentitiesOnly yes
      StrictHostKeyChecking no
      EOF

      chmod -R 400 ~/.ssh/ssh_private_key ~/.ssh/config

      git config --global user.email ${GITLAB_USER_EMAIL}
      git config --global user.name ${GITLAB_USER_NAME}
      eval "$(ssh-agent -s)"
      ssh-add ~/.ssh/ssh_private_key
      git remote set-url origin git@gitlab.coko.foundation:${CI_PROJECT_PATH}.git
  script:
    - |
      # Bump client version
      cd packages/client
      npm version $VERSION_BUMP_TYPE
      # Bump server version
      cd ../server
      npm version $VERSION_BUMP_TYPE
      cd ../..
      NEW_VERSION=$(node -p "require('./packages/client/package.json').version")
      git add package.json packages/client/package.json packages/server/package.json
      git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]"
      git push origin HEAD:${CI_COMMIT_BRANCH} --follow-tags
      git push --tags
      echo "NEW_VERSION=${NEW_VERSION}" > version.env
      echo Release version: ${NEW_VERSION}
  artifacts:
    paths:
      - version.env
    expire_in: 1 hour

create_release:
  stage: Release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - bump version
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  before_script:
    - source version.env
  script:
    - echo "Creating release for version ${NEW_VERSION}"
  release:
    name: "${NEW_VERSION}"
    description: "Automatic release for version ${NEW_VERSION}"
    tag_name: "${NEW_VERSION}"
    ref: "$CI_COMMIT_SHA"
