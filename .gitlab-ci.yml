variables:
  IMAGE_ORG: cokoapps
  IMAGE_NAME: hhmi-ci-development
  WORKDIR: /home/node/hhmi
stages:
  - Build
  - Lint & Test
  - Deploy
  # - install
  # - deploy-storybook

build development:
  stage: Build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    - docker info
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - docker build --tag $IMAGE_ORG/$IMAGE_NAME:$CI_COMMIT_SHA ./packages/server -f packages/server/Dockerfile-development
    - docker push $IMAGE_ORG/$IMAGE_NAME:$CI_COMMIT_SHA

server lint js:
  stage: Lint & Test
  image: $IMAGE_ORG/$IMAGE_NAME:$CI_COMMIT_SHA
  script:
    - cd $WORKDIR
    - yarn eslint .

server unit test:
  stage: Lint & Test
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    - ls -la

