build storybook image:
  stage: build
  image: docker:19.03.12
  services:
    - docker:19.03.12-dind
  before_script:
    - docker info
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_PASSWORD" ]; then echo "Not pushing" && exit 0; fi
    - cd ./packages/client
    - docker pull $IMAGE_ORG/hhmi-storybook:latest || true
    - docker build --cache-from $IMAGE_ORG/hhmi-storybook:latest --tag $IMAGE_ORG/hhmi-storybook:$CI_COMMIT_SHA --tag $IMAGE_ORG/hhmi-storybook:latest . -f Dockerfile-storybook-deploy
    - docker push $IMAGE_ORG/hhmi-storybook:$CI_COMMIT_SHA
    - docker push $IMAGE_ORG/hhmi-storybook:latest
  only:
    - master
